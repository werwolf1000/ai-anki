# AI Anki — Docker Compose для TrueNAS Scale
# Pool: storage → /mnt/storage/web/ai-anki
# SMB: smb://truenas.local/web/ai-anki
#
# Запуск на NAS (SSH):
#   docker compose -f docker-compose.truenas.yml up -d --build
#
# В TrueNAS Apps → Custom App → Install via Compose укажите этот файл.

services:
  ai-anki:
    build: /mnt/storage/web/ai-anki
    image: ai-anki-web:latest
    container_name: ai-anki
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AI_ANKI_DATA_DIR: /data
      # Ollama на другом хосте — переопределите в UI или здесь:
      # OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - /mnt/storage/web/ai-anki/data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
