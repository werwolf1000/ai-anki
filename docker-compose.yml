# AI Anki — локальный запуск (Linux / macOS / Windows)
# docker compose up -d --build

services:
  ai-anki:
    build: .
    image: ai-anki-web:latest
    container_name: ai-anki
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AI_ANKI_DATA_DIR: /data
    volumes:
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
